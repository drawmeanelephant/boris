<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boris Site</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.55; }
    .admonition {
      margin: 1.25rem 0;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border-left: 4px solid #888;
      background: color-mix(in srgb, Canvas 92%, CanvasText 8%);
    }
    .admonition__title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.75;
      margin: 0 0 0.35rem;
    }
    .admonition__body > :first-child { margin-top: 0; }
    .admonition__body > :last-child { margin-bottom: 0; }
    .admonition--tip { border-left-color: #0a7; }
    .admonition--info { border-left-color: #48a; }
    .admonition--note { border-left-color: #48a; }
    .admonition--warning { border-left-color: #c80; }
    .admonition--danger { border-left-color: #c33; }
  </style>
</head>
<body>
<main>
{{content}}
</main>
</body>
</html>
