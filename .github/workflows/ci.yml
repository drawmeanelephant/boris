name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Feature 1: CMake is a compile-time host tool for static ApexMarkdown.
      # Not a runtime dependency; zig build remains the user entrypoint.
      - name: Install CMake (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Apex hostile ABI tests
        run: zig build test-apex-hostile

      - name: ApexMarkdown static libs present
        run: |
          test -f vendor/apex-markdown/build/libapex.a
          test -f vendor/apex-markdown/build/vendor/cmark-gfm/src/libcmark-gfm.a
          # Host still stub until Chat 3; version string proves product link path.
          zig build run -- --help >/dev/null
          nm zig-out/bin/boris 2>/dev/null | grep -q apex_version_string || \
            nm zig-out/bin/boris 2>/dev/null | grep -q _apex_version_string || \
            echo "note: nm symbol check skipped or stripped; libapex.a presence is required"

      # Optional ASan+UBSan smoke: opt-in only.
      # Not in default CI because sanitizer runtimes and zig cc flags vary by
      # host (especially macOS Apple Silicon). Local: zig build test-apex-sanitize
      # (exits 0 with a documented skip when sanitizers are unavailable).
      - name: Document sanitizer policy
        run: |
          echo "C sanitizers are opt-in: zig build test-apex-sanitize"
          echo "CI does not require a green sanitizer run (host-dependent runtime)."
