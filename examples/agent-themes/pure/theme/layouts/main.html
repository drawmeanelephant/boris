<!doctype html>
<html lang="en" data-theme="pure-field-notes" data-layout="main">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{{title}} · Pure Field Notes</title>
  <link rel="stylesheet" href="{{asset-url assets/pure-field-notes.css}}">
</head>
<body data-layout="main">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header" role="banner">
    <div class="site-header__inner">
      <a class="brand" href="index.html" aria-label="Pure Field Notes home">
        <span class="brand__mark" aria-hidden="true">PF</span>
        <span class="brand__text">Pure Field Notes</span>
      </a>
      {{breadcrumb}}
    </div>
  </header>
  <div class="page-grid">
    <aside class="rail rail--browse" aria-label="Browse">
      <details class="browse-disclosure" open>
        <summary>Browse the notes</summary>
        {{nav}}
      </details>
    </aside>
    <main id="main-content" class="reading-column" tabindex="-1">
      {{metadata}}
      <article class="prose">
        {{content}}
      </article>
    </main>
    <aside class="rail rail--toc" aria-label="On this page">
      <p class="rail__eyebrow">On this page</p>
      {{toc}}
    </aside>
  </div>
  <footer class="theme-footer" role="contentinfo">{{footer}}</footer>
</body>
</html>
