<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">Load, Roll, Ignite, Reset</title>
  <desc id="desc">Four-step Boris teaching rhythm: load content, roll graph and frontmatter, ignite HTML, reset page scratch.</desc>
  <rect width="640" height="160" rx="16" fill="#0f766e"/>
  <g fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" text-anchor="middle">
    <rect x="24" y="36" width="120" height="88" rx="12" fill="#134e4a"/>
    <text x="84" y="78" font-size="18" font-weight="700">Load</text>
    <text x="84" y="102" font-size="12" fill="#99f6e4">discover</text>

    <path d="M156 80h28" stroke="#99f6e4" stroke-width="3" stroke-linecap="round"/>
    <path d="M176 70l12 10-12 10" fill="none" stroke="#99f6e4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="196" y="36" width="120" height="88" rx="12" fill="#134e4a"/>
    <text x="256" y="78" font-size="18" font-weight="700">Roll</text>
    <text x="256" y="102" font-size="12" fill="#99f6e4">graph + FM</text>

    <path d="M328 80h28" stroke="#99f6e4" stroke-width="3" stroke-linecap="round"/>
    <path d="M348 70l12 10-12 10" fill="none" stroke="#99f6e4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="368" y="36" width="120" height="88" rx="12" fill="#1d4ed8"/>
    <text x="428" y="78" font-size="18" font-weight="700">Ignite</text>
    <text x="428" y="102" font-size="12" fill="#bfdbfe">emit HTML</text>

    <path d="M500 80h28" stroke="#99f6e4" stroke-width="3" stroke-linecap="round"/>
    <path d="M520 70l12 10-12 10" fill="none" stroke="#99f6e4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="540" y="36" width="76" height="88" rx="12" fill="#134e4a"/>
    <text x="578" y="78" font-size="16" font-weight="700">Reset</text>
    <text x="578" y="102" font-size="11" fill="#99f6e4">scratch</text>
  </g>
</svg>
