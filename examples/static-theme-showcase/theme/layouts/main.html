<!doctype html>
<html lang="en" data-layout="main" data-theme="boris-showcase">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} · Boris Showcase</title>
  <link rel="stylesheet" href="{{asset-url assets/css/showcase.css}}">
  <link rel="icon" href="{{asset-url assets/img/mark.svg}}" type="image/svg+xml">
</head>
<body data-layout="main">
  <header class="navbar">
    <div class="navbar__brand">
      <img class="navbar__mark" src="{{asset-url assets/img/mark.svg}}" width="28" height="28" alt="">
      <span class="navbar__title">Boris Showcase</span>
      <span class="badge badge--primary">docs</span>
    </div>
    {{breadcrumb}}
  </header>
  <div class="shell">
    <aside class="sidebar card">
      <p class="sidebar__label">Site</p>
      {{nav}}
    </aside>
    <main class="main card">
      {{metadata}}
      {{toc}}
      <article class="prose">
        {{content}}
      </article>
    </main>
  </div>
  <footer class="footer">{{footer}}</footer>
</body>
</html>
